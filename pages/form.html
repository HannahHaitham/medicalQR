<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical QR Generator</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    label {
      color: var(--primary) !important;
    }
    #formTitle {
      color: var(--primary);
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module" src="../js/script.js" defer></script>
</head>
<body>

  <!-- <============= NAVBAR =============> -->
  <nav class="glass-navbar">
    <img src="../imgs/logo-dark.png" alt="Logo" class="nav-logo" id="navLogo">
    <div class="nav-links">
      <a href="../index.html" id="navHomeText">Home</a>
      <a href="#" style="color: var(--primary);" id="navProfileText">Profile</a>
    </div>
  </nav>

  <!-- <============= FORM =============> -->
  <main class="main-container">

    <div class="top-actions">
      <button id="editBtn" title="Edit Info" class="icon-btn hidden">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z" />
        </svg>
      </button>

      <button id="deleteBtn" title="Delete Info" class="icon-btn hidden">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
        </svg>
      </button>
    </div>

    <div class="glass-card">
      <h2 id="formTitle" style="margin-bottom: 24px; text-align: center;">Medical Information QR Code</h2>

      <form id="medicalForm">
        
        <div class="form-group">
          <label for="name" id="labelName">Full Name:</label>
          <input type="text" id="name" placeholder="Full Name">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="age" id="labelAge">Age:</label>
            <input type="number" id="age" placeholder="Age" min="0">
          </div>
          
          <div class="form-group">
            <label for="blood" id="labelBlood">Blood Type:</label>
            <select id="blood">
              <option value="">Select</option>
              <option>A+</option><option>A-</option>
              <option>B+</option><option>B-</option>
              <option>AB+</option><option>AB-</option>
              <option>O+</option><option>O-</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="allergiesYesNo" id="labelAllergies">Allergies:</label>
          <select id="allergiesYesNo">
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
          <textarea id="allergies" placeholder="Specify allergies" class="hidden" style="margin-top: 12px;"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="diabetes" id="labelDiabetes">Diabetes:</label>
            <select id="diabetes">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
            </select>
            <select id="diabetesType" class="hidden" style="margin-top: 12px;">
              <option value="Type 1">Type 1</option>
              <option value="Type 2">Type 2</option>
              <option value="Gestational">Gestational</option>
            </select>
          </div>

          <div class="form-group">
            <label for="asthma" id="labelAsthma">Asthma:</label>
            <select id="asthma">
              <option value="No">No</option>
              <option value="Mild">Mild</option>
              <option value="Moderate">Moderate</option>
              <option value="Severe">Severe</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="highBP" id="labelHighBP">High Blood Pressure:</label>
            <select id="highBP">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
            </select>
          </div>

          <div class="form-group">
            <label for="lowBP" id="labelLowBP">Low Blood Pressure:</label>
            <select id="lowBP">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="strokeHistory" id="labelStroke">History of Strokes:</label>
            <select id="strokeHistory">
              <option value="No">No</option>
              <option value="Self">Self</option>
              <option value="Family Member">Family Member</option>
            </select>
          </div>

          <div class="form-group">
            <label for="epilepsy" id="labelEpilepsy">Epilepsy:</label>
            <select id="epilepsy">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
            </select>
            <select id="epilepsyType" class="hidden" style="margin-top: 12px;">
              <option value="Focal">Focal</option>
              <option value="Generalized">Generalized</option>
              <option value="Unknown">Unknown</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="DNR" id="labelDNR">DNR (Do Not Resuscitate):</label>
            <select id="DNR">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
            </select>
          </div>

          <div class="form-group">
            <label for="organDonor" id="labelOrganDonor">Organ Donor:</label>
            <select id="organDonor">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="smoke" id="labelSmoke">Do you smoke?</label>
          <select id="smoke">
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
          <input type="text" id="smokeFrequency" placeholder="How many packs/day" class="hidden" style="margin-top: 12px;">
        </div>

        <div class="form-group">
          <label for="medicine" id="labelMedicine">Medicine Taken:</label>
          <textarea id="medicine" placeholder="Medicines you take"></textarea>
        </div>

        <div class="form-group">
          <label for="notes" id="labelNotes">Notes:</label>
          <textarea id="notes" placeholder="Other medical notes"></textarea>
        </div>

        <div class="form-group">
          <label for="emergencyContact" id="labelEmergency">Emergency Contact:</label>
          <input type="text" id="emergencyContact" placeholder="Emergency contact number">
        </div>

        <div class="form-group">
          <label for="qrColor">QR Code Color:</label>
          <input type="color" id="qrColor" value="#007aff">
        </div>

      </form>

      <button type="button" id="confirmBtn" class="btn-primary" style="margin-top: 24px;">Confirm Info</button>

      <div id="qrcode" class="hidden"></div>
      
      <button type="button" id="downloadBtn" class="btn-secondary hidden" style="margin-top: 16px;">
        Download QR Code
      </button>

      <p style="text-align: center; margin-top: 32px; font-size: 12px; color: var(--text-secondary); font-weight: 500;">
        Designed & Developed by Hannah
      </p>

    </div>
  </main>

  <!-- <============= FLOATING ACTION BUTTON =============> -->
  <div class="fab-container">
    <div class="fab-menu" id="fabMenu">
      <button class="menu-btn" id="themeToggleBtn">
        <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <span id="themeText">Toggle Theme</span>
      </button>
      
      <div class="fab-divider"></div>
      
      <!-- Language Switcher in FAB Menu -->
      <button class="menu-btn" data-lang="en">🇺🇸 English</button>
      <button class="menu-btn" data-lang="es">🇪🇸 Español</button>
      <button class="menu-btn" data-lang="fr">🇫🇷 Français</button>
      <button class="menu-btn" data-lang="ar">🇸🇦 العربية</button>
    </div>

    <button class="fab-btn" id="fabBtn" title="Settings">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm0 6a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm9.33-4h-2.18c-.16-.6-.38-1.16-.65-1.68l1.54-1.54a1 1 0 0 0 0-1.41l-1.41-1.41a1 1 0 0 0-1.41 0l-1.54 1.54c-.52-.27-1.08-.49-1.68-.65V2.67a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v2.18c-.6.16-1.16.38-1.68.65L6.82 3.96a1 1 0 0 0-1.41 0L4.01 5.37a1 1 0 0 0 0 1.41l1.54 1.54c-.27.52-.49 1.08-.65 1.68H2.67a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h2.18c.16.6.38 1.16.65 1.68l-1.54 1.54a1 1 0 0 0 0 1.41l1.41 1.41a1 1 0 0 0 1.41 0l1.54-1.54c.52.27 1.08.49 1.68.65v2.18a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1v-2.18c.6-.16 1.16-.38 1.68-.65l1.54 1.54a1 1 0 0 0 1.41 0l1.41-1.41a1 1 0 0 0 0-1.41l-1.54-1.54c.27-.52.49-1.08.65-1.68h2.18a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1zM20 12h-2.02c-.12 1.04-.54 2-1.16 2.82l1.43 1.43-.71.71-1.43-1.43c-.82.62-1.78 1.04-2.82 1.16V20h-1v-2.02c-1.04-.12-2-.54-2.82-1.16l-1.43 1.43-.71-.71 1.43-1.43c-.62-.82-1.04-1.78-1.16-2.82H6v-1h2.02c.12-1.04.54-2 1.16-2.82L7.75 8.46l.71-.71 1.43 1.43c.82-.62 1.78-1.04 2.82-1.16V6h1v2.02c1.04.12 2 .54 2.82 1.16l1.43-1.43.71.71-1.43 1.43c.62.82 1.04 1.78 1.16 2.82H20v1z"/>
      </svg>
    </button>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="modal-overlay">
    <div class="modal-content">
      <p id="deleteModalText" style="font-size: 18px; font-weight: 500; margin-bottom: 24px;">Are you sure you want to delete your info?</p>
      <div class="modal-buttons">
        <button id="cancelDelete" class="btn-secondary">Cancel</button>
        <button id="confirmDelete" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

</body>
</html>
